version: '3'

tasks:
  default:
    cmds:
      - task --list
    silent: true

  sync:
    desc: "Sync project environment. Usage: task project -- <folder>"
    dir: "{{.CLI_ARGS}}"
    cmds:
      - uv sync
    preconditions:
      - sh: 'test -n "{{.CLI_ARGS}}"'
        msg: "Error: <folder> argument is required. Example: task project -- dbx-project"


  sync-all:
    desc: "Sync all projects and install all dependencies. Usage: task sync-all -- <folder>"
    dir: "{{.CLI_ARGS}}"
    cmds:
      - uv sync --all-packages --all-groups
    preconditions:
      - sh: 'test -n "{{.CLI_ARGS}}"'
        msg: "Error: <folder> argument is required. Example: task sync-all -- dagster-poc"


  dg-dev:
    desc: "Run Dagster dev server. Usage: task dg-dev -- <folder> (defaults to current folder)"
    dir: "{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{.USER_WORKING_DIR}}{{end}}"
    cmds:
      - uv sync --all-packages
      - 'if [ -f workspace.yaml ]; then dg dev --workspace workspace.yaml; else dg dev; fi'

  dev:
    desc: "Run Dagster dev server. Usage: task dev -- <folder> (defaults to current folder)"
    dir: "{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{.USER_WORKING_DIR}}{{end}}"
    cmds:
      - uv sync --all-packages
      - 'if [ -f workspace.yaml ]; then dg dev --workspace workspace.yaml; else dg dev; fi'

  pg-prepare:
    desc: "Setup PostgreSQL and load data"
    dir: "sling-project"
    cmds:
      - createdb jaffle_shop || true
      - sling conns set POSTGRES_CONN url="postgresql://localhost:5432/jaffle_shop?sslmode=disable"
      - sling run --src-conn "file://data/raw_customers.csv" --tgt-conn POSTGRES_CONN --tgt-object public.raw_customers
      - sling run --src-conn "file://data/raw_orders.csv" --tgt-conn POSTGRES_CONN --tgt-object public.raw_orders
      - sling run --src-conn "file://data/raw_payments.csv" --tgt-conn POSTGRES_CONN --tgt-object public.raw_payments

  pg-cli:
    desc: "Open PostgreSQL CLI for jaffle_shop"
    cmds:
      - psql -h localhost -d jaffle_shop

  ddb:
    desc: "Start DuckDB UI in dbx-project"
    dir: "dbx-project"
    cmds:
      - duckdb /tmp/jaffle_platform.duckdb -cmd "INSTALL ui; LOAD ui;" -ui

  test:
    desc: "Run pytest in a project. Usage: task test -- <folder> (defaults to current folder)"
    dir: "{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{.USER_WORKING_DIR}}{{end}}"
    cmds:
      - uv run pytest -v

  upgrade:
    desc: "Upgrade all packages (updates lockfile then syncs). Usage: task upgrade -- <folder>"
    dir: "{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{.USER_WORKING_DIR}}{{end}}"
    cmds:
      - uv lock --upgrade
      - uv sync

  upgrade-all:
    desc: "Upgrade all packages across workspace (updates lockfile then syncs). Usage: task upgrade-all -- <folder>"
    dir: "{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{.USER_WORKING_DIR}}{{end}}"
    cmds:
      - uv lock --upgrade
      - uv sync --all-packages --all-groups

  upgrade-package:
    desc: "Upgrade specific package(s) (updates lockfile then syncs). Usage: task upgrade-package -- <package1> <package2>"
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        packages="{{.CLI_ARGS}}"
        if [ -z "$packages" ]; then
          echo "Error: Package name(s) required. Example: task upgrade-package -- dagster dagster-webserver"
          exit 1
        fi
        uv lock --upgrade-package $packages
        uv sync
